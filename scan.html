<h2>📷 Scan</h2>

<div id="reader"></div>
<div id="actions"></div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="app.js" type="module"></script>

<script>
let role=localStorage.getItem("role");

function start(action){

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

let back = devices.find(d=>d.label.toLowerCase().includes("back")) || devices[0];

html5QrCode.start(
back.id,
{fps:10,qrbox:250},
(txt)=>{
updateBill(txt,action);
location="timeline.html?bill="+txt;
}
);

});

}

let html="";

if(role==="qc"){
html=`
<button onclick="start('pass')">✅ ผ่าน</button>
<button onclick="start('reject')">❌ Reject</button>`;
}
else if(role==="ship"){
html=`
<button onclick="start('received')">📦 รับสินค้า</button>
<button onclick="start('cancel')">❌ ยกเลิก</button>`;
}
else if(role==="account"){
html=`<button onclick="start('done')">💰 รับบิล</button>`;
}
else{
html=`<button onclick="start()">📷 เริ่มสแกน</button>`;
}

actions.innerHTML=html;
</script>
